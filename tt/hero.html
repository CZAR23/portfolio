<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Built Bold</title>

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --text: #C8C2AE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #141210;
        }

        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Image */
        .hero::before {
            content: "";
            position: absolute;
            inset: -8%;

            background: url("background.png") center center/cover no-repeat;

            transform: scale(1.15);
            filter: blur(20px);

            z-index: 0;
        }

        /* Dark overlay */
        .hero::after {
            content: "";
            position: absolute;
            inset: 0;

            background:
                linear-gradient(rgba(18, 16, 14, .45), rgba(18, 16, 14, .45));

            z-index: 1;
        }

        /* Infinite noise / grain */
        @keyframes noise-animation {
            0% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-5%, -5%);
            }

            20% {
                transform: translate(-10%, 5%);
            }

            30% {
                transform: translate(5%, -10%);
            }

            40% {
                transform: translate(-5%, 15%);
            }

            50% {
                transform: translate(-10%, 5%);
            }

            60% {
                transform: translate(15%, 0);
            }

            70% {
                transform: translate(0, 10%);
            }

            80% {
                transform: translate(-15%, 15%);
            }

            90% {
                transform: translate(10%, 5%);
            }

            100% {
                transform: translate(5%, 0);
            }
        }

        .grain {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 2;
            opacity: .15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: noise-animation 0.2s steps(4) infinite;
            mix-blend-mode: soft-light;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 3;

            width: 100%;
            height: 100%;

            display: grid;
            grid-template-columns: 1fr auto 1fr;

            align-items: center;

            padding: 0 9vw;
        }

        .side {
            opacity: 0;
            /* Prevents FOUC before GSAP splits the text */
            font-family: 'Anton', sans-serif;
            color: var(--text);

            font-size: 8vw;
            line-height: .9;
            letter-spacing: 2px;
            text-transform: uppercase;

            text-shadow:
                0 2px 4px rgba(0, 0, 0, .35),
                0 20px 40px rgba(0, 0, 0, .25);
        }

        .left {
            justify-self: start;
        }

        .right {
            justify-self: end;
            text-align: right;
        }

        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            margin: 0 7vw;
            gap: 18px;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .symbol {
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 70px;
            font-weight: 700;
            display: inline-block;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Corner Brackets */

        .corner {
            width: 82px;
            height: 82px;
            position: relative;
        }

        .corner::before,
        .corner::after {
            content: "";
            position: absolute;
            background: var(--text);
            border-radius: 4px;
        }

        .top::before {
            width: 42px;
            height: 4px;
            left: 0;
            top: 0;
        }

        .top::after {
            width: 4px;
            height: 42px;
            right: 0;
            top: 0;
        }

        .bottom::before {
            width: 42px;
            height: 4px;
            right: 0;
            bottom: 0;
        }

        .bottom::after {
            width: 4px;
            height: 42px;
            left: 0;
            bottom: 0;
        }

        /* Responsive */

        @media(max-width:900px) {

            .container {
                grid-template-columns: 1fr;
                gap: 40px;
                text-align: center;
                padding: 0 15px;
            }

            .cnter {
                justify-self: center;
                text-align: center;
            }

            .side {
                font-size: clamp(48px, 16vw, 72px);
            }

            .symbol {
                font-size: clamp(40px, 12vw, 56px);
            }

            .corner {
                width: 60px;
                height: 60px;
            }

            .top::before,
            .bottom::before {
                width: 30px;
                height: 3px;
            }

            .top::after,
            .bottom::after {
                width: 3px;
                height: 30px;
            }

        }
    </style>
</head>

<body>

    <section class="hero">



        <div class="grain"></div>

        <div class="container">

            <div class="side left cnter">
                BUILT<br>
                BOLD
            </div>

            <div class="center">

                <div class="corner top"></div>

                <div class="symbol">沙皇</div>

                <div class="corner bottom"></div>

            </div>

            <div class="side right cnter">
                MADE<br>
                HUMANnnnnn
            </div>

        </div>

    </section>

    <!-- GSAP and ScrollTrigger CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.registerPlugin(ScrollTrigger);

            function splitTextIntoWords(element) {
                if (!element) return [];
                const nodes = Array.from(element.childNodes);
                element.innerHTML = '';
                const wordSpans = [];

                nodes.forEach(node => {
                    if (node.nodeType === Node.TEXT_NODE) {
                        const text = node.textContent;
                        const tokens = text.split(/(\s+)/);
                        tokens.forEach(token => {
                            if (token.trim() === '') {
                                element.appendChild(document.createTextNode(token));
                            } else {
                                const outerSpan = document.createElement('span');
                                outerSpan.style.display = 'inline-block';
                                outerSpan.style.overflow = 'hidden';
                                outerSpan.style.verticalAlign = 'top';

                                const innerSpan = document.createElement('span');
                                innerSpan.className = 'split-word';
                                innerSpan.textContent = token;
                                innerSpan.style.display = 'inline-block';
                                innerSpan.style.willChange = 'transform, opacity';

                                gsap.set(innerSpan, { y: 40, opacity: 0 });

                                outerSpan.appendChild(innerSpan);
                                element.appendChild(outerSpan);
                                wordSpans.push(innerSpan);
                            }
                        });
                    } else if (node.nodeType === Node.ELEMENT_NODE) {
                        element.appendChild(node.cloneNode(true));
                    }
                });

                return wordSpans;
            }

            const initAnimation = () => {
                const leftWords = splitTextIntoWords(document.querySelector('.side.left'));
                const rightWords = splitTextIntoWords(document.querySelector('.side.right'));

                // Set parent opacity to 1 now that children are set to opacity: 0 and y: 40
                gsap.set(['.side.left', '.side.right'], { opacity: 1 });

                // Animate left words (BUILT BOLD)
                if (leftWords.length > 0) {
                    gsap.to(leftWords, {
                        y: 0,
                        opacity: 1,
                        duration: 2,
                        ease: 'power3.out',
                        stagger: 0.12, // delay = 100ms
                        scrollTrigger: {
                            trigger: '.side.left',
                            start: 'top 90%-=100px', // threshold = 0.1, rootMargin = -100px
                            once: true
                        }
                    });
                }

                // Animate right words (MADE HUMAN)
                if (rightWords.length > 0) {
                    gsap.to(rightWords, {
                        y: 0,
                        opacity: 1,
                        duration: 3,
                        ease: 'power3.out',
                        stagger: 0.14,
                        scrollTrigger: {
                            trigger: '.side.right',
                            start: 'top 90%-=100px',
                            once: true
                        }
                    });
                }
            };

            // 3D Look-at-Cursor Effect and Extruded 3D Layers for the Symbol
            const symbol = document.querySelector('.symbol');
            if (symbol) {
                const text = symbol.textContent.trim();
                symbol.innerHTML = '';
                symbol.style.position = 'relative';
                symbol.style.transformStyle = 'preserve-3d';
                symbol.style.display = 'inline-block';

                const layers = 25; // 25 layers for thick 3D extrusion depth
                const baseColor = [200, 194, 174]; // RGB of var(--text) #C8C2AE

                for (let i = 0; i < layers; i++) {
                    const span = document.createElement('span');
                    span.textContent = text;
                    span.style.position = i === 0 ? 'relative' : 'absolute';
                    span.style.top = '0';
                    span.style.left = '0';
                    span.style.width = '100%';
                    span.style.height = '100%';
                    span.style.transform = `translateZ(${-i}px)`;
                    span.style.transformStyle = 'preserve-3d';

                    // Progressive shading (make deeper layers progressively darker)
                    const factor = 1 - (i / layers) * 0.65;
                    const r = Math.round(baseColor[0] * factor);
                    const g = Math.round(baseColor[1] * factor);
                    const b = Math.round(baseColor[2] * factor);
                    span.style.color = `rgb(${r}, ${g}, ${b})`;

                    if (i === 0) {
                        span.style.textShadow = '0 15px 30px rgba(0, 0, 0, 0.7)';
                    }

                    symbol.appendChild(span);
                }

                window.addEventListener('mousemove', (e) => {
                    const rect = symbol.getBoundingClientRect();
                    const symbolX = rect.left + rect.width / 2;
                    const symbolY = rect.top + rect.height / 2;

                    const deltaX = e.clientX - symbolX;
                    const deltaY = e.clientY - symbolY;

                    // Calculate rotations
                    const maxRotation = 45;
                    const rotX = gsap.utils.clamp(-maxRotation, maxRotation, -(deltaY / window.innerHeight) * 75);
                    const rotY = gsap.utils.clamp(-maxRotation, maxRotation, (deltaX / window.innerWidth) * 75);

                    gsap.to(symbol, {
                        rotationX: rotX,
                        rotationY: rotY,
                        transformPerspective: 1000,
                        ease: 'power2.out',
                        duration: 0.6,
                        overwrite: 'auto'
                    });
                });
            }

            // Safely wait for fonts to load to prevent size shifting issues
            if (document.fonts) {
                document.fonts.ready.then(initAnimation);
            } else {
                initAnimation();
            }
        });
    </script>


</body>

</html>
